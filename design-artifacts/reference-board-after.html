  --muted: oklch(0.965 0.008 95);
  --muted-foreground: oklch(0.53 0.014 275);

  --accent: oklch(0.91 0.07 155);

  --positive-foreground: oklch(0.30 0.075 158);

  --destructive: oklch(0.57 0.21 25);

  --border: oklch(0.92 0.005 95);
  --input: oklch(0.90 0.006 95);
  --ring: oklch(0.52 0.19 268);

  --sidebar: oklch(0.978 0.006 95);
  --sidebar-foreground: oklch(0.21 0.015 275);
  --sidebar-primary: oklch(0.52 0.19 268);
  --sidebar-primary-foreground: oklch(0.99 0.004 95);
  --sidebar-accent: oklch(0.955 0.010 95);
  --sidebar-accent-foreground: oklch(0.32 0.015 275);
  --sidebar-border: oklch(0.92 0.005 95);
  --sidebar-ring: oklch(0.52 0.19 268);

  /* Pipeline states — gut For-sure-not (warm grey) vs post-investigation No (clay) */

  --st-look: oklch(0.49 0.15 266);
  --st-notsure: oklch(0.80 0.11 82);
  --st-fsn: oklch(0.71 0.022 90);

  --st-unsure: oklch(0.68 0.11 320);
  --st-no: oklch(0.64 0.12 40);

  --avatar-0: oklch(0.88 0.085 268);
  --avatar-1: oklch(0.89 0.095 340);
  --avatar-2: oklch(0.89 0.085 200);
  --avatar-3: oklch(0.90 0.095 82);
  --avatar-4: oklch(0.89 0.085 320);
  --avatar-5: oklch(0.89 0.085 155);
  --avatar-6: oklch(0.90 0.085 235);
  --avatar-7: oklch(0.89 0.095 30);
  --avatar-8: oklch(0.91 0.085 110);
  --avatar-9: oklch(0.88 0.095 290);
  --avatar-ink: oklch(0.30 0.03 275);

  --shadow-xs: 0 1px 2px oklch(0.2 0.03 275 / 0.05);
  --shadow-sm: 0 1px 2px oklch(0.2 0.03 275 / 0.06), 0 1px 3px oklch(0.2 0.03 275 / 0.05);
  --shadow-md: 0 2px 4px oklch(0.2 0.03 275 / 0.05), 0 6px 16px oklch(0.2 0.03 275 / 0.08);
  --shadow-lg: 0 8px 24px oklch(0.2 0.03 275 / 0.10), 0 2px 6px oklch(0.2 0.03 275 / 0.06);
  --shadow-xl: 0 16px 40px oklch(0.2 0.03 275 / 0.14), 0 4px 10px oklch(0.2 0.03 275 / 0.08);

  --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-hebrew: "Heebo", "Inter", ui-sans-serif, system-ui, sans-serif;
}

.dark {
  --background: oklch(0.19 0.030 273);
  --foreground: oklch(0.965 0.010 90);
  --card: oklch(0.225 0.030 273);
  --card-foreground: oklch(0.965 0.010 90);
  --popover: oklch(0.225 0.030 273);
  --popover-foreground: oklch(0.965 0.010 90);

  --primary: oklch(0.57 0.20 266);
  --primary-foreground: oklch(0.99 0.003 90);

  --secondary: oklch(0.27 0.032 273);
  --secondary-foreground: oklch(0.965 0.010 90);
  --muted: oklch(0.27 0.032 273);
  --muted-foreground: oklch(0.73 0.028 273);

  --accent: oklch(0.35 0.09 158);
  --accent-foreground: oklch(0.92 0.07 158);

  --attention: oklch(0.53 0.185 68);
  --attention-strong: oklch(0.83 0.195 82);
  --attention-foreground: oklch(0.965 0.05 85);

  --positive: oklch(0.75 0.185 156);
  --positive-foreground: oklch(0.18 0.05 155);

  --destructive: oklch(0.63 0.235 25);

  --border: oklch(1 0 0 / 0.11);
  --input: oklch(1 0 0 / 0.15);
  --ring: oklch(0.57 0.20 266);

  --sidebar: oklch(0.205 0.030 273);
  --sidebar-foreground: oklch(0.965 0.010 90);
  --sidebar-primary: oklch(0.57 0.20 266);
  --sidebar-primary-foreground: oklch(0.99 0.003 90);
  --sidebar-accent: oklch(0.28 0.032 273);
  --sidebar-accent-foreground: oklch(0.965 0.010 90);
  --sidebar-border: oklch(1 0 0 / 0.09);
  --sidebar-ring: oklch(0.57 0.20 266);

  --st-new: oklch(0.71 0.13 252);
  --st-look: oklch(0.67 0.21 266);
  --st-notsure: oklch(0.81 0.165 84);
  --st-fsn: oklch(0.61 0.028 270);
  --st-yes: oklch(0.75 0.185 156);
  --st-unsure: oklch(0.73 0.17 320);
  --st-no: oklch(0.69 0.175 42);

  --avatar-0: oklch(0.47 0.16 268);
  --avatar-1: oklch(0.48 0.17 340);
  --avatar-2: oklch(0.47 0.15 200);
  --avatar-3: oklch(0.51 0.16 82);
  --avatar-4: oklch(0.47 0.16 320);
  --avatar-5: oklch(0.47 0.15 155);
  --avatar-6: oklch(0.48 0.16 235);
  --avatar-7: oklch(0.48 0.17 30);
  --avatar-8: oklch(0.51 0.15 110);
  --avatar-9: oklch(0.47 0.17 290);
  --avatar-ink: oklch(0.97 0.01 90);

  --shadow-xs: 0 1px 2px oklch(0 0 0 / 0.35);
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.40), 0 1px 3px oklch(0 0 0 / 0.30);
  --shadow-md: 0 2px 4px oklch(0 0 0 / 0.34), 0 6px 16px oklch(0 0 0 / 0.40);
  --shadow-lg: 0 8px 28px oklch(0 0 0 / 0.50), 0 2px 6px oklch(0 0 0 / 0.34);
  --shadow-xl: 0 20px 48px oklch(0 0 0 / 0.58), 0 6px 14px oklch(0 0 0 / 0.40);
}

/* ============================================================================
   RESET / BASE
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  background: var(--background);
  color: var(--foreground);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-variant-ligatures: common-ligatures;
}
.he { font-family: var(--font-hebrew); }
.tnum { font-variant-numeric: tabular-nums; }
svg { display: block; }

/* ============================================================================
   APP SHELL
   ========================================================================== */
.app { display: flex; min-height: 100vh; }

/* --- Sidebar --------------------------------------------------------------- */
.sidebar {
  width: 244px;
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
  gap: 22px;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px; }
.brand-mark {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--primary); color: var(--primary-foreground);
  display: grid; place-items: center;
  box-shadow: var(--shadow-sm);
}
.brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.015em; }
.brand-name span { color: var(--primary); }

.nav { display: flex; flex-direction: column; gap: 2px; }
.nav-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--muted-foreground);
  padding: 4px 10px; margin-bottom: 2px;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 10px; border-radius: 10px;
  color: var(--sidebar-foreground);
  font-size: 14px; font-weight: 500;
  text-decoration: none; cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--muted-foreground); }
.nav-item:hover { background: var(--sidebar-accent); }
.nav-item.active {
  background: color-mix(in oklch, var(--sidebar-primary) 12%, transparent);
  color: var(--sidebar-primary);
  font-weight: 600;
}
.nav-item.active svg { color: var(--sidebar-primary); }
.nav-count {
  margin-left: auto; font-size: 12px; font-weight: 600;
  color: var(--muted-foreground);
}
.sidebar-foot { margin-top: auto; }
.trust {
  font-size: 11.5px; line-height: 1.5; color: var(--muted-foreground);
  padding: 10px; border-radius: 10px; background: var(--sidebar-accent);
  display: flex; gap: 8px; align-items: flex-start;
}
.trust svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; color: var(--positive); }

/* --- Main + top bar -------------------------------------------------------- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  height: 60px; flex-shrink: 0;
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in oklch, var(--background) 86%, transparent);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 5;
}
.child-switch {
  display: inline-flex; padding: 3px; gap: 2px;
  background: var(--secondary); border-radius: 999px;
  border: 1px solid var(--border);
}
.child-chip {
  border: none; background: transparent; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600;
  color: var(--muted-foreground);
  padding: 6px 15px; border-radius: 999px;
  transition: all 120ms ease;
}
.child-chip.active {
  background: var(--card); color: var(--foreground);
  box-shadow: var(--shadow-xs);
}
.search {
  flex: 1; max-width: 340px;
  display: flex; align-items: center; gap: 9px;
  padding: 8px 13px; border-radius: 10px;
  background: var(--secondary); border: 1px solid var(--border);
  color: var(--muted-foreground); font-size: 13.5px;
}
.search svg { width: 16px; height: 16px; }
.spacer { flex: 1; }
.iconbtn {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted-foreground); cursor: pointer;
  display: grid; place-items: center;
  transition: background 120ms ease, color 120ms ease;
}
.iconbtn:hover { background: var(--secondary); color: var(--foreground); }
.iconbtn svg { width: 18px; height: 18px; }
.lang {
  display: inline-flex; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; font-size: 13px; font-weight: 600;
}
.lang span { padding: 8px 12px; color: var(--muted-foreground); background: var(--card); }
.lang span.on { background: var(--primary); color: var(--primary-foreground); }
.me {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--avatar-0); color: var(--avatar-ink);
  display: grid; place-items: center; font-size: 13px; font-weight: 700;
}

/* --- Page header ----------------------------------------------------------- */
.page { padding: 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
}
.page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
.page-sub { font-size: 13.5px; color: var(--muted-foreground); margin: 6px 0 0; }
.btn-primary {
  border: none; cursor: pointer; font-family: inherit;
  font-size: 13.5px; font-weight: 600;
  color: var(--primary-foreground); background: var(--primary);
  padding: 10px 16px; border-radius: 10px;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-sm);
  transition: filter 120ms ease, box-shadow 120ms ease;
}
.btn-primary:hover { filter: brightness(1.06); box-shadow: var(--shadow-md); }
.btn-primary svg { width: 16px; height: 16px; }

/* ============================================================================
   BOARD  (mirrors DealList → DealColumn → DealCard, elevated)
   ========================================================================== */
.board {
  display: flex; gap: 16px; align-items: flex-start;
  overflow-x: auto; padding-bottom: 20px; flex: 1;
  scrollbar-width: thin;
}
.board::-webkit-scrollbar { height: 10px; }
.board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

.column { flex: 0 0 250px; display: flex; flex-direction: column; gap: 12px; }

.col-head {
  display: flex; align-items: center; gap: 9px;
  padding: 2px 4px;
}
.col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px color-mix(in oklch, var(--col) 22%, transparent); }
.col-name { font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
.col-name .he { font-weight: 500; color: var(--muted-foreground); font-size: 12.5px; margin-inline-start: 5px; }
.col-count {
  margin-left: auto; font-size: 12px; font-weight: 600;
  color: var(--muted-foreground);
  min-width: 22px; text-align: center;
  padding: 2px 7px; border-radius: 999px; background: var(--secondary);
}
.col-underline { height: 2px; border-radius: 2px; background: color-mix(in oklch, var(--col) 55%, transparent); margin: -6px 4px 0; }

/* group captions over the two board halves */
.col-group {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted-foreground);
  padding: 0 4px 3px; height: 15px;
}

.stack { display: flex; flex-direction: column; gap: 10px; min-height: 48px; }

/* --- Card ------------------------------------------------------------------ */
.card {
  background: var(--card); color: var(--card-foreground);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px; cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 140ms ease, transform 140ms ease, border-color 140ms ease;
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); border-color: color-mix(in oklch, var(--primary) 26%, var(--border)); }
.card-top { display: flex; gap: 11px; align-items: flex-start; }
.avatar {
  width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
  display: grid; place-items: center;
  font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
  color: var(--avatar-ink);
}
.card-name { font-size: 14.5px; font-weight: 600; line-height: 1.25; letter-spacing: -0.01em; }
.card-name .he { display: block; font-weight: 500; font-size: 13px; color: var(--muted-foreground); margin-top: 1px; }
.card-meta { font-size: 12px; color: var(--muted-foreground); margin-top: 7px; line-height: 1.45; }
.card-foot {
  display: flex; align-items: center; gap: 6px; margin-top: 11px;
  padding-top: 10px; border-top: 1px solid var(--border);
  font-size: 11.5px; color: var(--muted-foreground);
}
.card-foot svg { width: 13px; height: 13px; flex-shrink: 0; }
.via {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: var(--muted-foreground);
}
.dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-foreground); opacity: 0.5; }

/* Honey "Suggested before" catch chip */
.catch {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px;
  font-size: 11.5px; font-weight: 600;
  color: var(--attention-foreground);
  background: var(--attention);
  border-radius: 8px; padding: 6px 9px;
  line-height: 1.3;
}
.catch svg { width: 13px; height: 13px; flex-shrink: 0; }

/* gut vs post-investigation micro-note */
.col-note { font-size: 11px; color: var(--muted-foreground); padding: 0 4px; margin-top: -4px; line-height: 1.4; }

.add-card {
  display: flex; align-items: center; gap: 7px;
  border: 1px dashed var(--border); border-radius: 11px;
  padding: 9px 11px; font-size: 12.5px; font-weight: 500;
  color: var(--muted-foreground); background: transparent; cursor: pointer;
  font-family: inherit; transition: background 120ms ease, border-color 120ms ease;
}
.add-card:hover { background: var(--secondary); border-color: var(--muted-foreground); color: var(--foreground); }
.add-card svg { width: 14px; height: 14px; }

@media (max-width: 860px) {
  .sidebar { display: none; }
}
</style>
</head>

      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="trust">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        <span>Private to you. Run at cost, never pooled or shared.</span>
      </div>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main">

    <!-- top bar -->
    <header class="topbar">
      <div class="child-switch">
        <button class="child-chip active">Rivky</button>
        <button class="child-chip">Yaakov</button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
        Search shadchanim, singles, references…
      </div>
      <div class="spacer"></div>
      <div class="lang"><span class="on">EN</span><span class="he">עב</span></div>
      <button class="iconbtn" id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme">
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <div class="me">CK</div>
    </header>

    <!-- page -->
    <main class="page">
      <div class="page-head">
        <div>
          <h1 class="page-title">Pipeline — Rivky <span class="he" style="font-weight:500;color:var(--muted-foreground);font-size:20px;">רבקה</span></h1>
          <p class="page-sub">13 suggestions across 7 states · a calm memory of every redt, from every shadchan.</p>
        </div>
        <button class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Add a suggestion
        </button>
      </div>

      <div class="board" id="board"><!-- columns injected --></div>
    </main>
  </div>
</div>

<script>
/* ---------------------------------------------------------------------------
   Data + render. Structure mirrors DealList → DealColumn → DealCard.
   ------------------------------------------------------------------------- */
const AV = ["var(--avatar-0)","var(--avatar-1)","var(--avatar-2)","var(--avatar-3)","var(--avatar-4)","var(--avatar-5)","var(--avatar-6)","var(--avatar-7)","var(--avatar-8)","var(--avatar-9)"];

const STAGES = [
  { id:"new",     label:"New",          he:"חדש",     color:"var(--st-new)",     group:"Triage" },
  { id:"look",    label:"Look-into",    he:"לבדוק",   color:"var(--st-look)",    group:"Triage" },
  { id:"notsure", label:"Not-sure",     he:"לא בטוחה", color:"var(--st-notsure)", group:"Triage" },
  { id:"fsn",     label:"For-sure-not", he:"בטוח לא",  color:"var(--st-fsn)",     group:"Triage", note:"Gut set-aside — no full look yet." },
  { id:"yes",     label:"Yes",          he:"כן",       color:"var(--st-yes)",     group:"Decision" },
  { id:"unsure",  label:"Unsure",       he:"מתלבטת",   color:"var(--st-unsure)",  group:"Decision" },
  { id:"no",      label:"No",           he:"לא",       color:"var(--st-no)",      group:"Decision", note:"Looked into — decided against." },
];

const CARDS = [
  // NEW
  { name:"Ari Rosenberg",   he:"אריה רוזנברג", mono:"AR", av:2, shadchan:"Mrs. Gold",     loc:"Baltimore, MD", school:"Ner Yisroel",  redt:"20 Jul 2026", stage:"new" },
  { name:"Menachem Stern",  he:"מנחם שטרן",    mono:"MS", av:7, shadchan:"Mrs. D. Klein", loc:"Brooklyn, NY",  school:"Chaim Berlin", redt:"19 Jul 2026", stage:"new" },
  { name:"Boruch Sofer",    he:"ברוך סופר",    mono:"BS", av:8, shadchan:"Mrs. Weiss",    loc:"Lakewood, NJ",  school:"BMG",          redt:"19 Jul 2026", stage:"new" },
  // LOOK-INTO
  { name:"Dovid Berkowitz", he:"דוד ברקוביץ",  mono:"DB", av:0, shadchan:"Mrs. Feldman",  loc:"Lakewood, NJ",  school:"BMG",          redt:"18 Jul 2026", stage:"look", catch:"Mrs. Feldman suggested him 3 months ago" },
  { name:"Shmuli Katz",     he:"שמואל כ״ץ",    mono:"SK", av:1, shadchan:"Mrs. Weiss",    loc:"Monsey, NY",    school:"Mir",          redt:"14 Jul 2026", stage:"look" },
  { name:"Yisroel Fried",   he:"ישראל פריד",   mono:"YF", av:9, shadchan:"Mrs. Feldman",  loc:"Cleveland, OH", school:"Telshe",       redt:"9 Jul 2026",  stage:"look" },
  // NOT-SURE
  { name:"Yehuda Klein",    he:"יהודה קליין",  mono:"YK", av:6, shadchan:"Mrs. Weiss",    loc:"Lakewood, NJ",  school:"BMG",          redt:"12 Jul 2026", stage:"notsure" },
  { name:"Moshe Diamond",   he:"משה דיאמונד",  mono:"MD", av:4, shadchan:"Mrs. Gold",     loc:"Monsey, NY",    school:"Mir",          redt:"7 Jul 2026",  stage:"notsure", catch:"Rivky may have dated him — Feb 2026" },
  // FOR-SURE-NOT (gut)
  { name:"Eli Traube",      he:"אלי טרויבה",   mono:"ET", av:3, shadchan:"Mrs. Feldman",  loc:"Baltimore, MD", school:"Ner Yisroel",  redt:"14 Apr 2026", stage:"fsn" },
  // YES
  { name:"Chaim Landau",    he:"חיים לנדא",    mono:"CL", av:5, shadchan:"Mrs. Gold",     loc:"Monsey, NY",    school:"Mir",          redt:"2 Jul 2026",  stage:"yes" },
  { name:"Yosef Gross",     he:"יוסף גרוס",    mono:"YG", av:8, shadchan:"Mrs. Weiss",    loc:"Lakewood, NJ",  school:"BMG",          redt:"28 Jun 2026", stage:"yes" },
  // UNSURE
  { name:"Tzvi Adler",      he:"צבי אדלר",     mono:"TA", av:7, shadchan:"Mrs. D. Klein", loc:"Baltimore, MD", school:"Ner Yisroel",  redt:"28 Jun 2026", stage:"unsure" },
  // NO (post-investigation)
  { name:"Naftali Berger",  he:"נפתלי ברגר",   mono:"NB", av:9, shadchan:"Mrs. Feldman",  loc:"Lakewood, NJ",  school:"BMG",          redt:"9 Apr 2026",  stage:"no" },
];

const clockSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
const catchSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
const plusSvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';

function esc(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function cardHtml(c){
  const catchHtml = c.catch
    ? `<div class="catch">${catchSvg}<span>Suggested before — ${esc(c.catch)}</span></div>`
    : "";
  return `
    <div class="card">
      <div class="card-top">
        <div class="avatar" style="background:${AV[c.av]}">${c.mono}</div>
        <div style="min-width:0;flex:1">
          <div class="card-name">${esc(c.name)}<span class="he">${esc(c.he)}</span></div>
          <div class="card-meta">${esc(c.loc)} · ${esc(c.school)}</div>
        </div>
      </div>
      ${catchHtml}
      <div class="card-foot">
        <span class="via">via ${esc(c.shadchan)}</span>
        <span class="dot-sep"></span>
        <span class="via tnum">${clockSvg}Redt ${esc(c.redt)}</span>
      </div>
    </div>`;
}

function render(){
  const board = document.getElementById("board");
  board.innerHTML = STAGES.map(st => {
    const items = CARDS.filter(c => c.stage === st.id);
    const cards = items.map(cardHtml).join("");
    const note = st.note ? `<div class="col-note">${st.note}</div>` : "";
    return `
      <section class="column" style="--col:${st.color}">
        <div class="col-group">${st.group}</div>
        <div class="col-head">
          <span class="col-dot" style="background:${st.color}"></span>
          <span class="col-name">${st.label}<span class="he">${st.he}</span></span>
          <span class="col-count tnum">${items.length}</span>
        </div>
        <div class="col-underline"></div>
        ${note}
        <div class="stack">
          ${cards}
          <button class="add-card">${plusSvg} Add here</button>
        </div>
      </section>`;
  }).join("");
}
render();

/* theme toggle */
const root = document.documentElement;
const sun = document.getElementById("iconSun");
const moon = document.getElementById("iconMoon");
function applyTheme(dark){
  root.classList.toggle("dark", dark);
  sun.style.display = dark ? "none" : "block";
  moon.style.display = dark ? "block" : "none";
}
if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) applyTheme(true);
document.getElementById("themeToggle").addEventListener("click", () => applyTheme(!root.classList.contains("dark")));
</script>
</body>
</html>
