name = "myshadchan-ingest"
main = "index.ts"
compatibility_date = "2026-07-21"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME> --config workers/ingest/wrangler.toml`,
# or the CI job in .github/workflows/deploy.yml): SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.
#
# Cloudflare Email Routing itself is wired up in the dashboard (or `wrangler
# email` once available) to point an inbound address at this Worker — that
# binding isn't expressed in this file.
